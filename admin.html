<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אתגרים כרמיאל-משגב | ניהול מאמנים</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { heebo: ['Heebo', 'sans-serif'] },
                    colors: {
                        brand: { light: '#FFF7ED', DEFAULT: '#F97316', dark: '#C2410C' },
                    }
                }
            }
        }
    </script>
</head>
<body class="font-heebo bg-gray-50 text-gray-800 min-h-screen">

    <!-- Login Screen -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-orange-50 to-amber-50 px-4">
        <div class="bg-white rounded-3xl shadow-xl p-8 w-full max-w-sm text-center">
            <div class="text-5xl mb-4">🔐</div>
            <h1 class="text-2xl font-black text-gray-900 mb-2">כניסת מאמנים</h1>
            <p class="text-gray-500 text-sm mb-6">אתגרים כרמיאל-משגב</p>
            <form id="login-form">
                <input type="password" id="login-password" placeholder="סיסמה"
                       class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-brand focus:ring-2 focus:ring-brand/20 outline-none transition text-center text-lg mb-4"
                       autocomplete="current-password">
                <button type="submit" class="w-full bg-brand hover:bg-brand-dark text-white py-3 rounded-xl font-bold text-lg transition-all">
                    כניסה
                </button>
                <div id="login-error" class="hidden mt-3 text-red-500 text-sm">סיסמה שגויה</div>
            </form>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="admin-dashboard" class="hidden">
        <!-- Top Bar -->
        <header class="bg-white shadow-sm sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <span class="text-2xl">🏃</span>
                    <h1 class="text-lg font-bold text-brand-dark">ניהול אתגרים</h1>
                </div>
                <div class="flex items-center gap-3">
                    <a href="index.html" class="text-sm text-gray-500 hover:text-brand transition">← לאתר</a>
                    <button id="logout-btn" class="text-sm text-red-500 hover:text-red-700 transition">התנתק</button>
                </div>
            </div>
            <!-- Tabs -->
            <div class="max-w-7xl mx-auto px-4 flex gap-1 overflow-x-auto pb-2">
                <button class="admin-tab active px-4 py-2 rounded-lg text-sm font-medium transition whitespace-nowrap" data-tab="dashboard">📊 סקירה</button>
                <button class="admin-tab px-4 py-2 rounded-lg text-sm font-medium transition whitespace-nowrap" data-tab="trainees">🏃 מתאמנים</button>
                <button class="admin-tab px-4 py-2 rounded-lg text-sm font-medium transition whitespace-nowrap" data-tab="volunteers">🤝 מתנדבים</button>
                <button class="admin-tab px-4 py-2 rounded-lg text-sm font-medium transition whitespace-nowrap" data-tab="stories">✨ השראה</button>
                <button class="admin-tab px-4 py-2 rounded-lg text-sm font-medium transition whitespace-nowrap" data-tab="signups">📋 פניות</button>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 py-6">
            <!-- Dashboard Tab -->
            <div id="tab-dashboard" class="tab-content">
                <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                    <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                        <div class="text-3xl mb-2">🏃</div>
                        <div class="text-2xl font-black text-gray-900" id="dash-trainees">0</div>
                        <div class="text-sm text-gray-500">מתאמנים</div>
                    </div>
                    <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                        <div class="text-3xl mb-2">🤝</div>
                        <div class="text-2xl font-black text-gray-900" id="dash-volunteers">0</div>
                        <div class="text-sm text-gray-500">מתנדבים</div>
                    </div>
                    <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                        <div class="text-3xl mb-2">📋</div>
                        <div class="text-2xl font-black text-gray-900" id="dash-signups">0</div>
                        <div class="text-sm text-gray-500">פניות חדשות</div>
                    </div>
                    <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                        <div class="text-3xl mb-2">✨</div>
                        <div class="text-2xl font-black text-gray-900" id="dash-stories">0</div>
                        <div class="text-sm text-gray-500">סיפורי השראה</div>
                    </div>
                </div>
                <!-- Groups breakdown -->
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                    <h3 class="font-bold text-lg mb-4">חלוקה לקבוצות</h3>
                    <div class="grid grid-cols-4 gap-4 text-center" id="dash-groups">
                        <div class="p-3 bg-red-50 rounded-xl">
                            <div class="text-2xl">🦅</div>
                            <div class="font-bold text-lg" id="dash-group-a">0</div>
                            <div class="text-xs text-gray-500">נשרים</div>
                        </div>
                        <div class="p-3 bg-orange-50 rounded-xl">
                            <div class="text-2xl">🐺</div>
                            <div class="font-bold text-lg" id="dash-group-b">0</div>
                            <div class="text-xs text-gray-500">זאבים</div>
                        </div>
                        <div class="p-3 bg-blue-50 rounded-xl">
                            <div class="text-2xl">🐬</div>
                            <div class="font-bold text-lg" id="dash-group-c">0</div>
                            <div class="text-xs text-gray-500">דולפינים</div>
                        </div>
                        <div class="p-3 bg-yellow-50 rounded-xl">
                            <div class="text-2xl">🐻</div>
                            <div class="font-bold text-lg" id="dash-group-d">0</div>
                            <div class="text-xs text-gray-500">דובים</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Trainees Tab -->
            <div id="tab-trainees" class="tab-content hidden">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold">ניהול מתאמנים</h2>
                    <div class="flex gap-2">
                        <a href="https://etgarimkarmielmisgav.duckdns.org/" target="_blank" rel="noopener"
                           class="flex items-center gap-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-xl text-sm font-medium transition">
                            🏃 אפליקציית מתאמנים ↗
                        </a>
                        <button id="add-trainee-btn" class="bg-brand text-white px-4 py-2 rounded-xl text-sm font-medium hover:bg-brand-dark transition">
                            + הוסף מתאמן
                        </button>
                    </div>
                </div>
                <!-- Filters -->
                <div class="flex gap-2 mb-4 flex-wrap">
                    <button class="trainee-filter active px-3 py-1.5 rounded-lg text-sm border transition" data-group="all">הכל</button>
                    <button class="trainee-filter px-3 py-1.5 rounded-lg text-sm border transition" data-group="A">🦅 נשרים</button>
                    <button class="trainee-filter px-3 py-1.5 rounded-lg text-sm border transition" data-group="B">🐺 זאבים</button>
                    <button class="trainee-filter px-3 py-1.5 rounded-lg text-sm border transition" data-group="C">🐬 דולפינים</button>
                    <button class="trainee-filter px-3 py-1.5 rounded-lg text-sm border transition" data-group="D">🐻 דובים</button>
                </div>
                <div id="trainees-list" class="space-y-2"></div>
            </div>

            <!-- Volunteers Tab -->
            <div id="tab-volunteers" class="tab-content hidden">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold">ניהול מתנדבים</h2>
                    <button id="add-volunteer-btn" class="bg-brand text-white px-4 py-2 rounded-xl text-sm font-medium hover:bg-brand-dark transition">
                        + הוסף מתנדב
                    </button>
                </div>
                <div id="volunteers-list" class="space-y-2"></div>
            </div>

            <!-- Stories Tab -->
            <div id="tab-stories" class="tab-content hidden">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold">לוח השראה</h2>
                    <button id="add-story-btn" class="bg-brand text-white px-4 py-2 rounded-xl text-sm font-medium hover:bg-brand-dark transition">
                        + הוסף סיפור
                    </button>
                </div>
                <div id="stories-list" class="grid sm:grid-cols-2 gap-4"></div>
            </div>

            <!-- Signups Tab -->
            <div id="tab-signups" class="tab-content hidden">
                <h2 class="text-xl font-bold mb-4">פניות מתנדבים חדשים</h2>
                <div id="signups-list" class="space-y-2"></div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="modal-overlay" class="hidden fixed inset-0 bg-black/50 z-[100] flex items-center justify-center px-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[85vh] overflow-y-auto p-6" id="modal-content">
            <!-- Dynamic content -->
        </div>
    </div>

    <script src="data.js"></script>
    <script src="admin.js"></script>

    <style>
        .admin-tab { color: #6B7280; background: transparent; }
        .admin-tab:hover { background: #F3F4F6; }
        .admin-tab.active { background: #FFF7ED; color: #F97316; font-weight: 600; }
        .trainee-filter { background: white; border-color: #E5E7EB; color: #6B7280; }
        .trainee-filter:hover { border-color: #F97316; }
        .trainee-filter.active { background: #FFF7ED; border-color: #F97316; color: #F97316; font-weight: 600; }
    </style>
</body>
</html>
