<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אתגרים כרמיאל-משגב | ניהול מתאמנים</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #pin-screen {
            display: none;
            position: fixed; inset: 0;
            background: linear-gradient(135deg, #fff7ed, #ffedd5);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1rem;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }
        .pin-box {
            background: white;
            border-radius: 20px;
            padding: 2.5rem 2rem;
            box-shadow: 0 8px 40px rgba(0,0,0,0.12);
            text-align: center;
            max-width: 320px;
            width: 90%;
        }
        .pin-box h2 { margin: 0 0 0.5rem; font-size: 1.5rem; color: #1f2937; }
        .pin-box p  { margin: 0 0 1.5rem; color: #6b7280; font-size: 0.9rem; }
        .pin-box input {
            width: 100%; box-sizing: border-box;
            padding: 0.75rem 1rem; font-size: 1.3rem;
            border: 2px solid #e5e7eb; border-radius: 12px;
            text-align: center; letter-spacing: 0.4rem;
            outline: none; margin-bottom: 0.75rem;
        }
        .pin-box input:focus { border-color: #f97316; }
        .pin-box button {
            width: 100%; padding: 0.75rem;
            background: #f97316; color: white;
            border: none; border-radius: 12px;
            font-size: 1rem; font-weight: 700; cursor: pointer;
        }
        .pin-box button:hover { background: #ea6c0a; }
        #pin-error { color: #ef4444; font-size: 0.85rem; margin-top: 0.5rem; display: none; }
        #app-root { display: none; }
    </style>
</head>
<body>

<!-- PIN Screen -->
<div id="pin-screen">
    <div class="pin-box">
        <div style="font-size:2.5rem;margin-bottom:.5rem">🏃</div>
        <h2>כניסת מאמנים</h2>
        <p>אתגרים כרמיאל-משגב</p>
        <form id="pin-form">
            <input type="password" id="pin-input" placeholder="••••••" maxlength="10" inputmode="numeric" autocomplete="off">
            <button type="submit">כניסה</button>
        </form>
        <div id="pin-error">קוד שגוי, נסה שוב</div>
        <div style="margin-top:1.5rem">
            <a href="../" style="color:#9ca3af;font-size:.8rem;text-decoration:none">← חזרה לאתר</a>
        </div>
    </div>
</div>

<!-- App Root -->
<div id="app-root">
    <header>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:0 1rem">
            <a href="../" style="color:rgba(255,255,255,0.7);font-size:.85rem;text-decoration:none">← לאתר</a>
            <button onclick="localStorage.removeItem('etgarim_coach_pin_ok');location.reload()"
                style="background:rgba(255,255,255,0.15);border:none;color:white;padding:.3rem .8rem;border-radius:8px;cursor:pointer;font-size:.8rem">
                יציאה
            </button>
        </div>
        <div class="logo">
            <img class="logo-img" src="https://www.etgarim.org.il/wp-content/uploads/2020/01/etgarim-logo-white.png"
                 alt="אתגרים" onerror="this.style.display='none'; document.getElementById('fallbackLogo').style.display='flex'">
            <div class="logo-fallback" id="fallbackLogo" style="display:none">
                <span class="logo-text-fallback">אתגרים</span>
            </div>
        </div>
        <div class="branch-name">כרמיאל-משגב</div>
        <p class="subtitle">ניהול מתאמנים ותכניות אימון</p>
        <div class="stats" id="stats"></div>
    </header>

    <nav class="group-tabs" id="groupTabs">
        <button class="tab active" data-group="all">הכל</button>
        <button class="tab tab-a" data-group="A">🦅 נשרים</button>
        <button class="tab tab-b" data-group="B">🐺 זאבים</button>
        <button class="tab tab-c" data-group="C">🐬 דולפינים</button>
        <button class="tab tab-d" data-group="D">🐻 דובים</button>
    </nav>

    <div class="action-bar">
        <button class="btn-add-trainee" id="btnAddTrainee" onclick="openAddTraineeModal()">➕ הוסף מתאמן/ת</button>
    </div>

    <main id="mainContent"></main>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal">
            <button class="modal-close" id="modalClose">&times;</button>
            <div id="modalContent"></div>
        </div>
    </div>
</div>

<script src="data.js"></script>
<script src="seed.js"></script>
<script src="app.js"></script>
</body>
</html>
